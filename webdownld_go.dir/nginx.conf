# =============================================================================
# nginx.conf — 网盘服务前端代理
#
# 部署位置：浏览器与网盘服务端之间
# 职责：TLS 卸载 / 静态文件 / 限流 / 负载均衡 / 连接管理
#
# 启动方式（参考）：
#   docker run -v $PWD/nginx.conf:/etc/nginx/nginx.conf:ro nginx
#   或 直接替换系统 nginx 配置
# =============================================================================

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 8192;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;
    client_max_body_size 64m;          # 允许大分片上传

    # ——— 限流：按 IP 限制请求速率 ———
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    # 上传接口单独限流
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=20r/s;

    # ——— 上游：网盘服务集群 ———
    upstream webdisk_backend {
        # 加权轮询；max_fails + fail_timeout 自动摘除故障实例
        server 127.0.0.1:8188 weight=3 max_fails=3 fail_timeout=30s;
        # 多实例时取消下面注释：
        # server 192.168.1.2:8188 weight=3 max_fails=3 fail_timeout=30s;
        # server 192.168.1.3:8188 weight=3 max_fails=3 fail_timeout=30s;

        keepalive 32;                  # 对后端保持长连接池
        keepalive_requests 1000;
    }

    server {
        listen 80;
        server_name _;

        # ——— 健康检查（优先级最高，不限流） ———
        location = /healthz {
            proxy_pass http://webdisk_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        location = /readyz {
            proxy_pass http://webdisk_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 3s;
            access_log off;
        }

        # ——— 静态资源：不经过 Go，由 Nginx 零拷贝直接返回 ———
        location /assets/ {
            alias /opt/webdownld/web/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            sendfile on;
            tcp_nopush on;
        }

        # ——— 首页 ———
        location = / {
            proxy_pass http://webdisk_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ——— 可观测性端点 ———
        location = /metrics {
            proxy_pass http://webdisk_backend;
            access_log off;
        }

        location /debug/pprof/ {
            # 仅内网访问
            allow 127.0.0.1;
            allow 192.168.0.0/16;
            deny all;
            proxy_pass http://webdisk_backend;
        }

        # ——— API：代理到网盘服务 ———
        location /api/ {
            proxy_pass http://webdisk_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # 透传客户端信息
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_set_header X-Request-ID       $request_id;

            # 上传接口：加大超时，绑定 chunk 上传限流
            location /api/uploads/ {
                proxy_pass http://webdisk_backend;
                proxy_http_version 1.1;
                proxy_set_header Connection "";

                proxy_read_timeout 300s;           # 分片上传可能较慢
                proxy_send_timeout 300s;
                proxy_request_buffering off;       # 流式转发，不缓冲整个请求体
                client_body_timeout 120s;

                limit_req zone=upload_limit burst=10 nodelay;
            }

            # 下载接口：流式传输不限速
            location /api/files/ {
                proxy_pass http://webdisk_backend;
                proxy_http_version 1.1;
                proxy_set_header Connection "";

                proxy_read_timeout 300s;
                proxy_buffering off;               # 关闭代理缓冲，实时流式下发
            }

            # 通用 API 限流
            limit_req zone=api_limit burst=50 nodelay;
        }

        # ——— 日志 ———
        access_log /var/log/nginx/webdisk_access.log;
        error_log  /var/log/nginx/webdisk_error.log warn;
    }
}
